autoInstallPeers: false

dedupePeerDependents: true

engineStrict: true

saveExact: true

strictPeerDependencies: true

peerDependencyRules:
  ignoreMissing:
    - search-insights

overrides:
  fast-uri: ">=3.1.2"
  protobufjs: ">=7.6.1"
  # undici <8.5.0 advisories (GHSA-vmh5-mc38-953g TLS cert-validation bypass,
  # GHSA-38rv-x7px-6hhq / GHSA-vxpw-j846-p89q WebSocket DoS). Pulled in only via
  # testcontainers (declares `undici: ^8.3.0`); the fix is 8.5.0, which still
  # satisfies that range. Scoped to the testcontainers path so the unrelated
  # undici 7.x line resolved elsewhere is left untouched.
  testcontainers>undici: ">=8.5.0"

# esbuild <0.28.1 advisory (GHSA-gv7w-rqvm-qjhr): a Deno-only dev-server binary
# integrity issue. Only reachable transitively via vitepress>vite>esbuild, and
# vitepress pins a vite that is incompatible with esbuild 0.28.x (its build
# crashes transforming destructuring). Not exploitable for a static docs build,
# so it is ignored until vitepress ships a vite compatible with the fixed esbuild.
#
# vite <=6.4.2 advisory (GHSA-fx2h-pf6j-xcff): a `server.fs.deny` bypass on
# Windows alternate paths in `vite dev`. Only reachable transitively via
# vitepress 1.x, which pins vite 5.x; the fix exists only in vite 6.4.3+. The
# bypass affects the dev server only and is not exploitable for the static
# `vitepress build` output we ship, so it is ignored until vitepress 2.x lands.
auditConfig:
  ignoreGhsas:
    - "GHSA-gv7w-rqvm-qjhr"
    - "GHSA-fx2h-pf6j-xcff"

packages:
  - packages/*
  - examples/*
  - tools/*
  - docs

catalog:
  "@btravstack/theme": 1.2.1
  "@changesets/cli": 2.31.0
  "@commitlint/cli": 21.0.2
  "@commitlint/config-conventional": 21.0.2
  "@standard-schema/spec": 1.1.0
  "@temporalio/client": 1.18.1
  "@temporalio/common": 1.18.1
  "@temporalio/worker": 1.18.1
  "@temporalio/workflow": 1.18.1
  "@types/node": 24.13.2
  "@unthrown/vitest": 1.0.0
  "@vitest/coverage-v8": 4.1.8
  arktype: 2.2.1
  knip: 6.16.1
  lefthook: 2.1.9
  oxfmt: 0.56.0
  oxlint: 1.71.0
  pino: 10.3.1
  pino-pretty: 13.1.3
  testcontainers: 12.0.3
  tsdown: 0.22.3
  tsx: 4.22.4
  turbo: 2.9.18
  typedoc: 0.28.19
  typedoc-plugin-markdown: 4.12.0
  typescript: 6.0.3
  unthrown: 1.0.0
  valibot: 1.4.1
  vitest: 4.1.8
  zod: 4.4.3

allowBuilds:
  "@swc/core": true
  cpu-features: true
  esbuild: true
  lefthook: true
  protobufjs: true
  ssh2: true

minimumReleaseAge: 10080
minimumReleaseAgeStrict: true
# First-party btravstack packages — the maturity delay guards against
# third-party supply-chain risk, which does not apply to our own org's libraries.
minimumReleaseAgeExclude:
  - "@btravstack/theme"
  - "unthrown"
  - "@unthrown/vitest"

autoInstallPeers: false

dedupePeerDependents: true

engineStrict: true

saveExact: true

strictPeerDependencies: true

peerDependencyRules:
  ignoreMissing:
    - search-insights

overrides:
  lodash: ">=4.18.0"
  lodash-es: ">=4.18.0"
  picomatch: ">=2.3.2"
  preact: ">=10.28.2"
  protobufjs: ">=7.5.5"
  rollup: ">=4.59.0"
  serialize-javascript: ">=7.0.3"
  vite: ">=8.0.5"

packages:
  - packages/*
  - examples/*
  - tools/*
  - docs

catalog:
  "@changesets/cli": 2.31.0
  "@commitlint/cli": 21.0.2
  "@commitlint/config-conventional": 21.0.2
  "@standard-schema/spec": 1.1.0
  "@temporalio/client": 1.18.0
  "@temporalio/common": 1.18.0
  "@temporalio/worker": 1.18.0
  "@temporalio/workflow": 1.18.0
  "@types/node": 24.13.1
  "@vitest/coverage-v8": 4.1.8
  arktype: 2.2.0
  knip: 6.16.1
  lefthook: 2.1.9
  neverthrow: 8.2.0
  oxfmt: 0.54.0
  oxlint: 1.69.0
  pino: 10.3.1
  pino-pretty: 13.1.3
  testcontainers: 12.0.1
  ts-pattern: 5.9.0
  tsdown: 0.22.2
  tsx: 4.22.4
  turbo: 2.9.17
  typedoc: 0.28.19
  typedoc-plugin-markdown: 4.12.0
  typescript: 6.0.3
  valibot: 1.4.1
  vitest: 4.1.8
  zod: 4.4.3

minimumReleaseAgeExclude:
  - "@turbo/darwin-64@2.9.17"
  - "@turbo/darwin-arm64@2.9.17"
  - "@turbo/linux-64@2.9.17"
  - "@turbo/linux-arm64@2.9.17"
  - "@turbo/windows-64@2.9.17"
  - "@turbo/windows-arm64@2.9.17"
  - turbo@2.9.17

allowBuilds:
  "@swc/core": true
  cpu-features: true
  esbuild: true
  lefthook: true
  protobufjs: true
  ssh2: true
